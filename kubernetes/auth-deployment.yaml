apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: foodbridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/example/foodbridge-auth:latest
          ports:
            - containerPort: 4001
          envFrom:
            - secretRef:
                name: foodbridge-secrets
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_NAME
              value: foodbridge_auth
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: foodbridge
spec:
  selector:
    app: auth-service
  ports:
    - port: 4001
      targetPort: 4001
