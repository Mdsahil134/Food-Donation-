name: FoodBridge CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Test microservices
        run: |
          set -e
          for svc in auth-service donation-service notification-service tracking-service; do
            echo "========== $svc =========="
            cd "$svc"
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm test
            cd ..
          done

  build-backend-images:
    runs-on: ubuntu-latest
    needs: test-backend
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, donation-service, notification-service, tracking-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: foodbridge-${{ matrix.service }}:ci

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - uses: docker/setup-buildx-action@v3
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: foodbridge-frontend:ci
