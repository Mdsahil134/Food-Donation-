name: FoodBridge CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: foodbridge

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, donation-service, notification-service, tracking-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package.json
      - name: Install & test
        working-directory: ${{ matrix.service }}
        run: |
          npm install
          npm test
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:ci
      - name: Trivy scan (informational)
       uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:ci
          format: table
          exit-code: "0"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install & build
        working-directory: frontend
        run: |
          npm install
          npm run build
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/frontend:ci
