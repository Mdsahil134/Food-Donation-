worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 2048;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 20m;

  upstream auth_upstream {
    server auth-service:4001;
  }
  upstream donation_upstream {
    server donation-service:4002;
  }
  upstream notification_upstream {
    server notification-service:4003;
  }
  upstream tracking_upstream {
    server tracking-service:4004;
  }
  upstream frontend_upstream {
    server frontend:80;
  }

  server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;

    location /api/auth/ {
      proxy_pass http://auth_upstream;
    }

    location /api/donations/ {
      proxy_pass http://donation_upstream;
    }

    location /uploads/ {
      proxy_pass http://donation_upstream;
    }

    location /api/notifications/ {
      proxy_pass http://notification_upstream;
    }

    location /api/tracking/ {
      proxy_pass http://tracking_upstream;
    }

    location /health {
      default_type application/json;
      return 200 '{"status":"gateway-ok"}';
    }

    location / {
      proxy_pass http://frontend_upstream;
    }
  }
}
